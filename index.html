<!DOCTYPE html>

<html>
<head>
<title>Happy Birthday Benita ❤️</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:url("photo24.jpg") center/cover fixed;
margin:0;
color:white;
text-align:center;
overflow-x:hidden;
}

/* INTRO */

#cinemaIntro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:3000;
animation:fadeOut 6s forwards;
}

.introTitle{
font-size:48px;
opacity:0;
animation:titleFade 3s forwards 1s;
}

.introSub{
font-size:26px;
color:#ff7ac8;
opacity:0;
animation:titleFade 3s forwards 2.5s;
}

@keyframes titleFade{
0%{opacity:0;transform:translateY(40px);}
100%{opacity:1;transform:translateY(0);}
}

@keyframes fadeOut{
0%,80%{opacity:1;}
100%{opacity:0;visibility:hidden;}
}

/* GRID */

.mainGrid{
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
gap:25px;
padding:40px;
}

.memoryCard{
background:rgba(255,255,255,0.15);
border-radius:15px;
padding:10px;
cursor:pointer;
transition:0.4s;
}

.memoryCard:hover{
transform:scale(1.08);
box-shadow:0 0 20px pink;
}

.memoryCard img{
width:100%;
height:240px;
object-fit:cover;
border-radius:12px;
}

/* SLIDER */

.slider img{
width:100%;
height:240px;
object-fit:contain;
border-radius:12px;
}

/* BUTTON */

button{
padding:14px 24px;
font-size:18px;
background:#ff4fa0;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

/* YEAR GRID */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("photo24.jpg") center/cover;
overflow:auto;
z-index:999;
}

.year-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:30px;
padding:50px;
}

.year-box{
background:linear-gradient(135deg,#ff7ac8,#ff4fa0);
padding:35px;
border-radius:20px;
font-size:26px;
cursor:pointer;
transition:0.4s;
}

.year-box:hover{
transform:scale(1.2);
box-shadow:0 0 25px pink;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:white;
color:black;
padding:30px;
border-radius:20px;
max-width:500px;
text-align:center;
position:relative;
}

.modal-content img{
width:100%;
max-height:400px;
object-fit:contain;
border-radius:12px;
}

/* HEART EFFECT */

.blinkHeart{
position:absolute;
font-size:30px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* SPARKLE */

.sparkle{
position:absolute;
font-size:25px;
animation:sparkle 1.5s infinite;
}

@keyframes sparkle{
0%{opacity:0;transform:scale(0.5)}
50%{opacity:1;transform:scale(1.2)}
100%{opacity:0;transform:scale(0.5)}
}

/* FIREWORK */

.firework{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1.2s linear forwards;
}

@keyframes explode{
0%{transform:scale(1);}
100%{transform:scale(6);opacity:0;}
}

</style>

</head>

<body>

<audio autoplay>
<source src="song1.mp3" type="audio/mpeg">
</audio>

<div id="cinemaIntro">
<h1 class="introTitle">Happy 26th Birthday Benita</h1>
<h2 class="introSub">From Your Thambi (THE KING)</h2>
</div>

<h1>🎂 Happy 26th Birthday Darling 🎂</h1>

<button onclick="openYears()">💌 Open Surprise</button>

<div class="mainGrid">

<div class="memoryCard" onclick="openMemory('photo1.jpg','This was one of the happiest memories we shared ❤️')">
<img src="photo1.jpg">
</div>

<div class="memoryCard" onclick="openMemory('photo2.jpg','Life feels brighter because you are my sister ✨')">
<img src="photo2.jpg">
</div>

<div class="memoryCard" onclick="openMemory('photo3.jpg','Every memory with you becomes special 💖')">
<img src="photo3.jpg">
</div>

<div class="slider">
<h3>Beautiful Memories Together 💖</h3>
<img id="slideImage" src="photo4.jpg">
</div>

</div>

<!-- YEAR GRID -->

<div id="yearPopup" class="popup">

<div class="year-grid">

<div class="year-box" onclick="openYear('2001','photo4.jpg','The year you were born ❤️','heart')">2001</div>

<div class="year-box" onclick="openYear('2002','photo5.jpg','Your first smile brightened lives ✨','sparkle')">2002</div>

<div class="year-box" onclick="openYear('2003','photo6.jpg','Growing with love 😊','heart')">2003</div>

<div class="year-box" onclick="openYear('2004','photo7.jpg','Every year more beautiful 🌸','sparkle')">2004</div>

<div class="year-box" onclick="openYear('2026','photo30.jpg','Happy 26th Birthday 🎂','firework')">2026</div>

</div>

<button onclick="closeYears()">Close</button>

</div>

<!-- MEMORY MODAL -->

<div id="memoryModal" class="modal">
<div class="modal-content">
<img id="memoryPhoto">
<p id="memoryText"></p>
<button onclick="closeMemory()">Close</button>
</div>
</div>

<!-- YEAR MODAL -->

<div id="yearModal" class="modal">
<div class="modal-content" id="yearContent">
<h2 id="yearTitle"></h2>
<img id="yearPhoto">
<p id="yearText"></p>
<button onclick="closeYear()">Close</button>
</div>
</div>

<script>

/* MEMORY */

function openMemory(photo,text){

document.getElementById("memoryModal").style.display="flex";
document.getElementById("memoryPhoto").src=photo;
document.getElementById("memoryText").innerText=text;

}

function closeMemory(){

document.getElementById("memoryModal").style.display="none";

}

/* YEAR */

function openYear(year,photo,text,effect){

document.getElementById("yearModal").style.display="flex";

document.getElementById("yearTitle").innerText=year;
document.getElementById("yearPhoto").src=photo;
document.getElementById("yearText").innerText=text;

if(effect=="heart"){
createHearts();
}

if(effect=="sparkle"){
createSparkles();
}

if(effect=="firework"){
fireworks();
}

}

function closeYear(){

document.getElementById("yearModal").style.display="none";

}

function openYears(){
document.getElementById("yearPopup").style.display="block";
}

function closeYears(){
document.getElementById("yearPopup").style.display="none";
}

/* HEART EFFECT */

function createHearts(){

for(let i=0;i<6;i++){

let heart=document.createElement("div");

heart.className="blinkHeart";

heart.innerHTML="❤️";

heart.style.top=Math.random()*300+"px";
heart.style.left=Math.random()*300+"px";

document.getElementById("yearContent").appendChild(heart);

}

}

/* SPARKLE */

function createSparkles(){

for(let i=0;i<6;i++){

let star=document.createElement("div");

star.className="sparkle";

star.innerHTML="✨";

star.style.top=Math.random()*300+"px";
star.style.left=Math.random()*300+"px";

document.getElementById("yearContent").appendChild(star);

}

}

/* FIREWORK */

function fireworks(){

for(let i=0;i<60;i++){

let f=document.createElement("div");

f.className="firework";

f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*60+"vh";
f.style.background="hsl("+Math.random()*360+",100%,60%)";

document.body.appendChild(f);

setTimeout(()=>f.remove(),1200);

}

}

/* SLIDER */

let images=[];
for(let i=4;i<=35;i++){images.push("photo"+i+".jpg");}

let index=0;

setInterval(()=>{
index++;
if(index>=images.length){index=0;}
document.getElementById("slideImage").src=images[index];
},3000);

</script>

</body>
</html>

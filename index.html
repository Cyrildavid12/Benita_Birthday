<!DOCTYPE html>

<html>
<head>
<title>Happy Birthday Benita ❤️</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:url("photo24.jpg") center/cover fixed;
margin:0;
color:white;
text-align:center;
overflow-x:hidden;
}

/* PARTICLE CANVAS */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* INTRO */

#cinemaIntro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:3000;
animation:fadeOut 6s forwards;
}

.introTitle{
font-size:48px;
opacity:0;
animation:titleFade 3s forwards 1s;
}

.introSub{
font-size:26px;
color:#ff7ac8;
opacity:0;
animation:titleFade 3s forwards 2.5s;
}

@keyframes titleFade{
0%{opacity:0;transform:translateY(40px);}
100%{opacity:1;transform:translateY(0);}
}

@keyframes fadeOut{
0%,80%{opacity:1;}
100%{opacity:0;visibility:hidden;}
}

/* MEMORY ROW */

.memories{
display:flex;
justify-content:center;
gap:20px;
padding:40px;
}

.memoryCard{
width:300px;
background:rgba(255,255,255,0.15);
padding:10px;
border-radius:15px;
cursor:pointer;
transition:0.4s;
}

.memoryCard:hover{
transform:scale(1.08);
box-shadow:0 0 20px pink;
}

.memoryCard img{
width:100%;
height:220px;
object-fit:cover;
border-radius:12px;
}

/* SLIDER */

.slider{
width:80%;
margin:40px auto;
overflow:hidden;
border-radius:15px;
}

.slider-track{
display:flex;
width:calc(250px * 26);
animation:scroll 40s linear infinite;
}

.slider img{
width:250px;
height:200px;
object-fit:cover;
margin-right:10px;
border-radius:10px;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* BUTTON */

button{
padding:14px 24px;
font-size:18px;
background:#ff4fa0;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

/* YEAR GRID */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("photo24.jpg") center/cover;
overflow:auto;
z-index:999;
}

.year-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:25px;
padding:50px;
}

.year-box{
background:linear-gradient(135deg,#ff7ac8,#ff4fa0);
padding:30px;
border-radius:15px;
font-size:24px;
cursor:pointer;
transition:0.4s;
}

.year-box:hover{
transform:scale(1.15);
box-shadow:0 0 25px pink;
}

/* MODALS */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:white;
color:black;
padding:30px;
border-radius:20px;
max-width:500px;
text-align:center;
position:relative;
}

.modal-content img{
width:100%;
max-height:400px;
object-fit:contain;
border-radius:12px;
}

/* HEART EFFECT */

.heart{
position:absolute;
font-size:28px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* SPARKLE */

.sparkle{
position:absolute;
font-size:25px;
animation:sparkle 1.5s infinite;
}

@keyframes sparkle{
0%{opacity:0;transform:scale(0.5)}
50%{opacity:1;transform:scale(1.3)}
100%{opacity:0}
}

/* FIREWORK */

.firework{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1.2s linear forwards;
}

@keyframes explode{
0%{transform:scale(1);}
100%{transform:scale(6);opacity:0;}
}

</style>

</head>

<body>

<script>

/* PARTICLES BACKGROUND */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function animateParticles(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

});

requestAnimationFrame(animateParticles);

}

animateParticles();

/* MEMORY */

function openMemory(photo,text){
document.getElementById("memoryModal").style.display="flex";
document.getElementById("memoryPhoto").src=photo;
document.getElementById("memoryText").innerText=text;
}

function closeMemory(){
document.getElementById("memoryModal").style.display="none";
}

/* YEAR */

function openYear(year,photo,text,effect){

document.getElementById("yearModal").style.display="flex";

document.getElementById("yearTitle").innerText=year;
document.getElementById("yearPhoto").src=photo;
document.getElementById("yearText").innerText=text;

if(effect=="heart"){createHearts();}
if(effect=="sparkle"){createSparkles();}
if(effect=="firework"){fireworks();}

}

function closeYear(){
document.getElementById("yearModal").style.display="none";
}

function openYears(){
document.getElementById("yearPopup").style.display="block";
}

function closeYears(){
document.getElementById("yearPopup").style.display="none";
}

/* HEARTS */

function createHearts(){
for(let i=0;i<5;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.top=Math.random()*300+"px";
h.style.left=Math.random()*300+"px";
document.getElementById("yearContent").appendChild(h);
}
}

/* SPARKLES */

function createSparkles(){
for(let i=0;i<6;i++){
let s=document.createElement("div");
s.className="sparkle";
s.innerHTML="✨";
s.style.top=Math.random()*300+"px";
s.style.left=Math.random()*300+"px";
document.getElementById("yearContent").appendChild(s);
}
}

/* FIREWORK */

function fireworks(){
for(let i=0;i<60;i++){
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*60+"vh";
f.style.background="hsl("+Math.random()*360+",100%,60%)";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1200);
}
}

/* MUSIC START AFTER FIRST CLICK */

const music = document.getElementById("bgMusic");

document.body.addEventListener("click", function(){
music.play();
}, {once:true});

</script>

<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Benita ❤️</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
text-align:center;
background-size:cover;
background-position:center;
background-attachment:fixed;
margin:0;
padding:0;
color:white;
overflow-x:hidden;
transition:background-image 2s ease;
}

/* INTRO */

#cinemaIntro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:3000;
animation:fadeOut 6s forwards;
}

.introTitle{
font-size:48px;
opacity:0;
animation:titleFade 3s forwards 1s;
}

.introSub{
font-size:28px;
color:#ff7ac8;
opacity:0;
animation:titleFade 3s forwards 2.5s;
}

@keyframes titleFade{
0%{opacity:0;transform:translateY(40px);}
100%{opacity:1;transform:translateY(0);}
}

@keyframes fadeOut{
0%,80%{opacity:1;}
100%{opacity:0;visibility:hidden;}
}

/* GIFT */

#intro{
position:fixed;
width:100%;
height:100%;
background:#111;
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}

.gift{
font-size:90px;
cursor:pointer;
transition:0.5s;
}

.gift:hover{
transform:scale(1.3) rotate(10deg);
}

.hidden{display:none;}

/* MEMORY CARDS */

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:30px;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:15px;
padding:10px;
transition:0.4s;
}

.card:hover{
transform:scale(1.08);
box-shadow:0 0 20px pink;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:12px;
}

/* SLIDER */

.slider{
width:420px;
margin:40px auto;
}

.slider img{
width:100%;
height:280px;
object-fit:contain;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.6);
background:black;
}

/* YEAR GRID */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
overflow:auto;
z-index:999;
}

.year-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:25px;
padding:40px;
}

.year-box{
background:linear-gradient(135deg,#ff7ac8,#ff4fa0);
padding:18px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
font-size:18px;
transition:0.4s;
}

.year-box:hover{
transform:scale(1.2);
box-shadow:0 0 20px pink;
}

/* MODAL */

.yearModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:white;
color:black;
padding:25px;
border-radius:20px;
max-width:500px;
text-align:center;
}

.modal-content img{
width:100%;
max-height:400px;
object-fit:contain;
border-radius:12px;
}

/* HEARTS */

@keyframes floatHeart{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

.heart{
position:fixed;
bottom:-20px;
font-size:22px;
animation:floatHeart 6s linear infinite;
}

/* CONFETTI */

.confetti{
position:fixed;
width:8px;
height:8px;
background:red;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{transform:translateY(100vh);}
}

/* PARTICLES */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

/* FIREWORKS */

.firework{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
background:yellow;
animation:explode 1.2s linear forwards;
}

@keyframes explode{
0%{transform:scale(1);}
100%{transform:scale(6);opacity:0;}
}

button{
padding:12px 20px;
font-size:16px;
background:#ff4fa0;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<audio id="music">
<source src="song1.mp3" type="audio/mpeg">
</audio>

<div id="cinemaIntro">
<h1 class="introTitle">Happy 26th Birthday Benita</h1>
<h2 class="introSub">From Your Thambi (THE KING)</h2>
</div>

<div id="intro">
<div class="gift" onclick="openGift()">🎁</div>
</div>

<div id="mainContent" class="hidden">

<h1>🎂 Happy 26th Birthday Darling 🎂</h1>

<button onclick="openYears();confettiExplosion()">💌 Open Surprise</button>

<div class="container">
<div class="card"><img src="photo1.jpg"></div>
<div class="card"><img src="photo2.jpg"></div>
<div class="card"><img src="photo3.jpg"></div>
</div>

<h2>Beautiful Memories Together 💖</h2>

<div class="slider">
<img id="slideImage" src="photo4.jpg">
</div>

</div>

<div id="yearPopup" class="popup">
<div class="year-grid">

<div class="year-box" onclick="openYear('2001','photo4.jpg')">2001</div>
<div class="year-box" onclick="openYear('2002','photo5.jpg')">2002</div>
<div class="year-box" onclick="openYear('2003','photo6.jpg')">2003</div>
<div class="year-box" onclick="openYear('2004','photo7.jpg')">2004</div>
<div class="year-box" onclick="openYear('2005','photo8.jpg')">2005</div>
<div class="year-box" onclick="openYear('2006','photo9.jpg')">2006</div>
<div class="year-box" onclick="openYear('2007','photo10.jpg')">2007</div>
<div class="year-box" onclick="openYear('2008','photo11.jpg')">2008</div>
<div class="year-box" onclick="openYear('2009','photo12.jpg')">2009</div>
<div class="year-box" onclick="openYear('2010','photo13.jpg')">2010</div>
<div class="year-box" onclick="openYear('2011','photo14.jpg')">2011</div>
<div class="year-box" onclick="openYear('2012','photo15.jpg')">2012</div>
<div class="year-box" onclick="openYear('2013','photo16.jpg')">2013</div>
<div class="year-box" onclick="openYear('2014','photo17.jpg')">2014</div>
<div class="year-box" onclick="openYear('2015','photo18.jpg')">2015</div>
<div class="year-box" onclick="openYear('2016','photo19.jpg')">2016</div>
<div class="year-box" onclick="openYear('2017','photo20.jpg')">2017</div>
<div class="year-box" onclick="openYear('2018','photo21.jpg')">2018</div>
<div class="year-box" onclick="openYear('2019','photo22.jpg')">2019</div>
<div class="year-box" onclick="openYear('2020','photo23.jpg')">2020</div>
<div class="year-box" onclick="openYear('2021','photo25.jpg')">2021</div>
<div class="year-box" onclick="openYear('2022','photo26.jpg')">2022</div>
<div class="year-box" onclick="openYear('2023','photo27.jpg')">2023</div>
<div class="year-box" onclick="openYear('2024','photo28.jpg')">2024</div>
<div class="year-box" onclick="openYear('2025','photo29.jpg')">2025</div>
<div class="year-box" onclick="openYear('2026','photo30.jpg');fireworks()">🎂 2026</div>

</div>

<button onclick="closeYears()">Close</button>

</div>

<div id="yearModal" class="yearModal">
<div class="modal-content">
<h2 id="yearTitle"></h2>
<img id="yearPhoto">
<p>Beautiful memory from this year 💖</p>
<button onclick="closeYear()">Close</button>
</div>
</div>

<script>

/* SHOW GIFT AFTER INTRO */
setTimeout(()=>{
document.getElementById("intro").style.display="flex";
},6000);

/* PLAY MUSIC */

function openGift(){
document.getElementById("intro").style.display="none";
document.getElementById("mainContent").classList.remove("hidden");
document.getElementById("music").play();
}

/* CONFETTI */

function confettiExplosion(){
for(let i=0;i<120;i++){
let confetti=document.createElement("div");
confetti.className="confetti";
confetti.style.left=Math.random()*100+"vw";
confetti.style.background="hsl("+Math.random()*360+",100%,50%)";
document.body.appendChild(confetti);
setTimeout(()=>confetti.remove(),3000);
}
}

/* HEARTS */

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},700);

/* FIREWORKS */

function fireworks(){
for(let i=0;i<60;i++){
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*60+"vh";
f.style.background="hsl("+Math.random()*360+",100%,60%)";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1200);
}
}

/* BACKGROUND CHANGE */

let backgrounds=["photo24.jpg","photo10.jpg"];
let bgIndex=0;

setInterval(()=>{
bgIndex++;
if(bgIndex>=backgrounds.length){bgIndex=0;}
document.body.style.backgroundImage="url("+backgrounds[bgIndex]+")";
},6000);

/* SLIDER */

let images=[];
for(let i=4;i<=35;i++){
images.push("photo"+i+".jpg");
}

let index=0;

setInterval(()=>{
index++;
if(index>=images.length){index=0;}
document.getElementById("slideImage").src=images[index];
},3000);

/* YEAR POPUP */

function openYears(){
document.getElementById("yearPopup").style.display="block";
}

function closeYears(){
document.getElementById("yearPopup").style.display="none";
}

function openYear(year,photo){
document.getElementById("yearModal").style.display="flex";
document.getElementById("yearTitle").innerText=year;
document.getElementById("yearPhoto").src=photo;
}

function closeYear(){
document.getElementById("yearModal").style.display="none";
}

/* PARTICLES */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function animateParticles(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;
});

requestAnimationFrame(animateParticles);

}

animateParticles();

</script>

</body>
</html>

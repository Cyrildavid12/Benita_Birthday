<!DOCTYPE html>

<html>
<head>
<title>Happy Birthday Benita ❤️</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:url("photo24.jpg") center/cover fixed;
margin:0;
color:white;
text-align:center;
overflow-x:hidden;
}

/* INTRO */

#cinemaIntro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:3000;
animation:fadeOut 6s forwards;
}

.introTitle{
font-size:48px;
opacity:0;
animation:titleFade 3s forwards 1s;
}

.introSub{
font-size:26px;
color:#ff7ac8;
opacity:0;
animation:titleFade 3s forwards 2.5s;
}

@keyframes titleFade{
0%{opacity:0;transform:translateY(40px);}
100%{opacity:1;transform:translateY(0);}
}

@keyframes fadeOut{
0%,80%{opacity:1;}
100%{opacity:0;visibility:hidden;}
}

/* GRID LAYOUT */

.mainGrid{
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
gap:25px;
padding:40px;
}

.memoryCard{
background:rgba(255,255,255,0.15);
border-radius:15px;
padding:10px;
cursor:pointer;
transition:0.4s;
}

.memoryCard:hover{
transform:scale(1.08);
box-shadow:0 0 20px pink;
}

.memoryCard img{
width:100%;
height:240px;
object-fit:cover;
border-radius:12px;
}

/* SLIDER */

.slider img{
width:100%;
height:240px;
object-fit:contain;
border-radius:12px;
}

/* BUTTON */

button{
padding:14px 24px;
font-size:18px;
background:#ff4fa0;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.highlight{
animation:pulse 1.2s infinite;
box-shadow:0 0 20px pink;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* YEARS */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("photo24.jpg") center/cover;
overflow:auto;
z-index:999;
}

.year-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:30px;
padding:50px;
}

.year-box{
background:linear-gradient(135deg,#ff7ac8,#ff4fa0);
padding:35px;
border-radius:20px;
font-size:26px;
cursor:pointer;
transition:0.4s;
}

.year-box:hover{
transform:scale(1.2);
box-shadow:0 0 25px pink;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:white;
color:black;
padding:30px;
border-radius:20px;
max-width:500px;
text-align:center;
}

.modal-content img{
width:100%;
max-height:400px;
object-fit:contain;
border-radius:12px;
}

/* HEARTS */

@keyframes floatHeart{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

.heart{
position:fixed;
bottom:-20px;
font-size:22px;
animation:floatHeart 6s linear infinite;
}

/* CONFETTI */

.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{transform:translateY(100vh);}
}

/* FIREWORK */

.firework{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1.2s linear forwards;
}

@keyframes explode{
0%{transform:scale(1);}
100%{transform:scale(6);opacity:0;}
}

</style>

</head>

<body>

<audio autoplay>
<source src="song1.mp3" type="audio/mpeg">
</audio>

<div id="cinemaIntro">
<h1 class="introTitle">Happy 26th Birthday Benita</h1>
<h2 class="introSub">From Your Thambi (THE KING)</h2>
</div>

<h1>🎂 Happy 26th Birthday Darling 🎂</h1>

<button id="surpriseBtn" onclick="confettiExplosion();openYears()">💌 Open Surprise</button>

<div class="mainGrid">

<div class="memoryCard" onclick="openMemory('photo1.jpg','This is one of my favorite memories with you ❤️')">
<img src="photo1.jpg">
</div>

<div class="memoryCard" onclick="openMemory('photo2.jpg','Life feels brighter because you are my sister ✨')">
<img src="photo2.jpg">
</div>

<div class="memoryCard" onclick="openMemory('photo3.jpg','Every memory with you becomes special 💖')">
<img src="photo3.jpg">
</div>

<div class="slider">
<h3>Beautiful Memories Together 💖</h3>
<img id="slideImage" src="photo4.jpg">
</div>

</div>

<!-- YEAR POPUP -->

<div id="yearPopup" class="popup">

<div class="year-grid">

<div class="year-box" onclick="openYear('2001','photo4.jpg','The year a beautiful soul was born ❤️')">2001</div>
<div class="year-box" onclick="openYear('2002','photo5.jpg','A little angel growing with love 👶')">2002</div>
<div class="year-box" onclick="openYear('2003','photo6.jpg','Your smile started brightening lives 😊')">2003</div>
<div class="year-box" onclick="openYear('2004','photo7.jpg','Every year you became more special 🌸')">2004</div>
<div class="year-box" onclick="openYear('2005','photo8.jpg','A year full of innocence 🎈')">2005</div>
<div class="year-box" onclick="openYear('2006','photo9.jpg','Your laughter became happiness 💖')">2006</div>

<div class="year-box" onclick="openYear('2007','photo10.jpg','More memories started building ✨')">2007</div>
<div class="year-box" onclick="openYear('2008','photo11.jpg','You kept shining brighter 🌟')">2008</div>
<div class="year-box" onclick="openYear('2009','photo12.jpg','Kindness and love everywhere 🌼')">2009</div>
<div class="year-box" onclick="openYear('2010','photo13.jpg','Another beautiful chapter 📖')">2010</div>

<div class="year-box" onclick="openYear('2011','photo14.jpg','More dreams started growing 💫')">2011</div>
<div class="year-box" onclick="openYear('2012','photo15.jpg','A year of sweet memories 🌷')">2012</div>
<div class="year-box" onclick="openYear('2013','photo16.jpg','You grew stronger and brighter ✨')">2013</div>
<div class="year-box" onclick="openYear('2014','photo17.jpg','Another amazing step in life 💕')">2014</div>
<div class="year-box" onclick="openYear('2015','photo18.jpg','Your smile kept lighting our world 😊')">2015</div>

<div class="year-box" onclick="openYear('2016','photo19.jpg','Memories that stay forever 💖')">2016</div>
<div class="year-box" onclick="openYear('2017','photo20.jpg','You became an inspiration 🌟')">2017</div>
<div class="year-box" onclick="openYear('2018','photo21.jpg','Another step towards dreams ✨')">2018</div>
<div class="year-box" onclick="openYear('2019','photo22.jpg','A year of wonderful stories 📖')">2019</div>
<div class="year-box" onclick="openYear('2020','photo23.jpg','Even tough times couldn’t stop your shine 💪')">2020</div>

<div class="year-box" onclick="openYear('2021','photo25.jpg','You kept growing beautifully 🌸')">2021</div>
<div class="year-box" onclick="openYear('2022','photo26.jpg','Life became even more colorful 🌈')">2022</div>
<div class="year-box" onclick="openYear('2023','photo27.jpg','You spread happiness everywhere 💖')">2023</div>
<div class="year-box" onclick="openYear('2024','photo28.jpg','Another unforgettable year ✨')">2024</div>
<div class="year-box" onclick="openYear('2025','photo29.jpg','Preparing for another beautiful chapter 🌟')">2025</div>

<div class="year-box" onclick="openYear('2026','photo30.jpg','Happy 26th Birthday 🎂❤️');fireworks()">2026</div>

</div>

<button onclick="closeYears()">Close</button>

</div>

<!-- MODALS -->

<div id="memoryModal" class="modal">
<div class="modal-content">
<img id="memoryPhoto">
<p id="memoryText"></p>
<button onclick="closeMemory()">Close</button>
</div>
</div>

<div id="yearModal" class="modal">
<div class="modal-content">
<h2 id="yearTitle"></h2>
<img id="yearPhoto">
<p id="yearText"></p>
<button onclick="closeYear()">Close</button>
</div>
</div>

<script>

/* BUTTON HIGHLIGHT */

setTimeout(()=>{
document.getElementById("surpriseBtn").classList.add("highlight");
},10000);

/* FLOATING HEARTS */

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},700);

/* SLIDER */

let images=[];
for(let i=4;i<=35;i++){images.push("photo"+i+".jpg");}

let index=0;

setInterval(()=>{
index++;
if(index>=images.length){index=0;}
document.getElementById("slideImage").src=images[index];
},3000);

/* TYPEWRITER TEXT */

function typeText(element,text){

element.innerHTML="";
let i=0;

function typing(){
if(i<text.length){
element.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,30);
}
}

typing();
}

/* MEMORY */

function openMemory(photo,text){
document.getElementById("memoryModal").style.display="flex";
document.getElementById("memoryPhoto").src=photo;
typeText(document.getElementById("memoryText"),text);
}

function closeMemory(){
document.getElementById("memoryModal").style.display="none";
}

/* YEAR */

function openYear(year,photo,text){
document.getElementById("yearModal").style.display="flex";
document.getElementById("yearTitle").innerText=year;
document.getElementById("yearPhoto").src=photo;
typeText(document.getElementById("yearText"),text);
}

function closeYear(){
document.getElementById("yearModal").style.display="none";
}

function openYears(){
document.getElementById("yearPopup").style.display="block";
}

function closeYears(){
document.getElementById("yearPopup").style.display="none";
}

/* CONFETTI */

function confettiExplosion(){
for(let i=0;i<120;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background="hsl("+Math.random()*360+",100%,50%)";
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

/* FIREWORKS */

function fireworks(){
for(let i=0;i<60;i++){
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*60+"vh";
f.style.background="hsl("+Math.random()*360+",100%,60%)";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1200);
}
}

</script>

</body>
</html>
